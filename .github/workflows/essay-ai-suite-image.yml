name: Build essay-ai-suite image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "services/essay-ai-suite/**"
      - ".github/workflows/essay-ai-suite-image.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/zhangyufei820/essay-ai-suite
  IMAGE_VERSION: 0.1.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/essay-ai-suite
          file: services/essay-ai-suite/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Shared AI service suite for Dify essay grading, OCR, document extraction, and batch jobs.
