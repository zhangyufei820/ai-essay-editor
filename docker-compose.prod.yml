# ============================================================
# Production docker-compose.prod.yml
# Architecture: shenxiang.school platform
# ============================================================
#
# 部署命令:
#   git pull && docker-compose -f docker-compose.prod.yml up -d --build nextjs
#
# 环境变量文件 (.env.production) 必须包含:
#   - SUPABASE_SERVICE_ROLE_KEY
#   - DIFY_API_KEY, DIFY_API_KEY_GPT5, DIFY_API_KEY_CLAUDE, etc.
#   - XUNHUPAY_APPSECRET
# ============================================================

services:
  # ----------------------------------------------------------
  # Lighthouse - GitHub Webhook CI/CD Trigger Server
  # ----------------------------------------------------------
  lighthouse:
    build:
      context: /data/nextjs/webhook
      dockerfile: Dockerfile.lighthouse
    container_name: shenxiang-lighthouse
    restart: unless-stopped
    read_only: true
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-你的密码}
    volumes:
      - /data/nextjs/webhook:/data/nextjs/webhook:ro
      - /data/nextjs/ai-essay-editor:/data/nextjs/ai-essay-editor:ro
      - /data/nextjs/.env:/data/nextjs/.env:ro
    networks:
      - shenxiang-net
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Next.js 应用
  # ----------------------------------------------------------
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_AUTHING_APP_ID: ${NEXT_PUBLIC_AUTHING_APP_ID}
        NEXT_BUILD_ID: ${NEXT_BUILD_ID:-}
        DEPLOYMENT_VERSION: ${DEPLOYMENT_VERSION:-}
      secrets:
        - next_server_actions_encryption_key
    image: ai-essay-editor:latest
    container_name: shenxiang-nextjs
    restart: unless-stopped
    read_only: true
    mem_limit: 2g
    cpus: 1.0
    pids_limit: 256
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DIFY_INTERNAL_URL=http://docker-api-1:5001/v1
      - DIFY_BASE_URL=http://docker-api-1:5001/v1
      - DIFY_IMAGE_GATEWAY_URL=http://dify-image-gateway:8001
      - DIFY_IMAGE_GATEWAY_PUBLIC_URL=http://43.154.111.156:8001
      - NEXT_PUBLIC_APP_URL=https://www.shenxiang.school
    tmpfs:
      - /app/.next/standalone/.next/cache
    networks:
      - shenxiang-net
      - docker_default
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  shenxiang-net:
    external: true
  docker_default:
    external: true

secrets:
  next_server_actions_encryption_key:
    environment: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
