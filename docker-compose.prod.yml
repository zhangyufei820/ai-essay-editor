# ============================================================
# Production docker-compose.prod.yml
# Architecture: shenxiang.school platform
# ============================================================
#
# 部署命令:
#   git pull && docker-compose -f docker-compose.prod.yml up -d --build nextjs
#
# 环境变量文件 (.env.production) 必须包含:
#   - SUPABASE_SERVICE_ROLE_KEY
#   - DIFY_API_KEY, DIFY_API_KEY_GPT5, DIFY_API_KEY_CLAUDE, etc.
#   - XUNHUPAY_APPSECRET
# ============================================================

version: '3.8'

services:
  # ----------------------------------------------------------
  # Lighthouse - GitHub Webhook CI/CD Trigger Server
  # ----------------------------------------------------------
  lighthouse:
    build:
      context: /data/nextjs/webhook
      dockerfile: Dockerfile.lighthouse
    container_name: shenxiang-lighthouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-你的密码}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/nextjs/webhook:/data/nextjs/webhook
      - /data/nextjs/ai-essay-editor:/data/nextjs/ai-essay-editor
      - /data/nextjs/.env:/data/nextjs/.env:ro
    networks:
      - shenxiang-net
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ----------------------------------------------------------
  # Next.js 应用
  # ----------------------------------------------------------
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_AUTHING_APP_ID: ${NEXT_PUBLIC_AUTHING_APP_ID}
    image: ai-essay-editor:latest
    container_name: shenxiang-nextjs
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - DIFY_INTERNAL_URL=http://docker-api-1:5001/v1
      - DIFY_BASE_URL=http://docker-api-1:5001/v1
      - DIFY_API_KEY=${DIFY_API_KEY}
      - DIFY_API_KEY_GPT5=${DIFY_API_KEY_GPT5}
      - DIFY_API_KEY_CLAUDE=${DIFY_API_KEY_CLAUDE}
      - DIFY_API_KEY_GEMINI=${DIFY_API_KEY_GEMINI}
      - DIFY_API_KEY_OPENCLAW=${DIFY_API_KEY_OPENCLAW}
      - DIFY_API_KEY_GROK42=${DIFY_API_KEY_GROK42}
      - DIFY_BANANA_API_KEY=${DIFY_BANANA_API_KEY}
      - DIFY_TEACHING_PRO_API_KEY=${DIFY_TEACHING_PRO_API_KEY}
      - DIFY_QUANQUANMATH_API_KEY=${DIFY_QUANQUANMATH_API_KEY}
      - DIFY_QUANQUANENGLISH_API_KEY=${DIFY_QUANQUANENGLISH_API_KEY}
      - DIFY_BEIKE_PRO_API_KEY=${DIFY_BEIKE_PRO_API_KEY}
      - DIFY_BANZHUREN_API_KEY=${DIFY_BANZHUREN_API_KEY}
      - NEXT_PUBLIC_APP_URL=https://www.shenxiang.school
      - NEXT_PUBLIC_AUTHING_APP_ID=${NEXT_PUBLIC_AUTHING_APP_ID}
      - XUNHUPAY_APPID=${XUNHUPAY_APPID}
      - XUNHUPAY_APPSECRET=${XUNHUPAY_APPSECRET}
    networks:
      - shenxiang-net
      - docker_default
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

networks:
  shenxiang-net:
    external: true
  docker_default:
    external: true
