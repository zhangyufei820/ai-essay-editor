services:
  essay-ai-suite:
    build: .
    container_name: essay-ai-suite
    restart: unless-stopped
    ports:
      - "${PANEL_APP_PORT_HTTP:-3100}:3100"
    environment:
      PORT: "3100"
      DATA_DIR: /app/data
      MAX_BATCH_SIZE: "${MAX_BATCH_SIZE:-20}"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-2}"
      JOB_TIMEOUT_SECONDS: "${JOB_TIMEOUT_SECONDS:-180}"
      MAX_RETRIES: "${MAX_RETRIES:-1}"
      API_TOKEN: "${API_TOKEN:-}"
      LLM_API_BASE_URL: "${LLM_API_BASE_URL:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      OCR_API_BASE_URL: "${OCR_API_BASE_URL:-}"
      OCR_API_KEY: "${OCR_API_KEY:-}"
      OCR_MODEL: "${OCR_MODEL:-}"
      DOC_EXTRACT_API_URL: "${DOC_EXTRACT_API_URL:-}"
      DOC_EXTRACT_API_KEY: "${DOC_EXTRACT_API_KEY:-}"
    volumes:
      - ./data:/app/data
    labels:
      createdBy: Apps

networks:
  default:
    name: 1panel-network
    external: true
