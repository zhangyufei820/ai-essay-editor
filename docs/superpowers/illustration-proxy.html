<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 680px;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px;
    color: #c9d1d9;
  }
  .label {
    display: inline-block;
    background: rgba(56, 139, 253, 0.15);
    border: 1px solid rgba(56, 139, 253, 0.4);
    color: #79c0ff;
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 10px;
    margin-bottom: 14px;
    font-family: monospace;
  }
  .app-window {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
  }
  .app-header {
    background: #21262d;
    padding: 12px 16px;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-icon {
    width: 20px;
    height: 20px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 5px;
  }
  .app-title {
    color: #e6edf3;
    font-size: 13px;
    font-weight: 500;
  }
  .app-body { padding: 20px; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #1c2128;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .setting-label {
    font-size: 13px;
    color: #c9d1d9;
  }
  .setting-desc {
    font-size: 11px;
    color: #7d8590;
    margin-top: 2px;
  }

  /* Toggle switch */
  .toggle {
    width: 40px;
    height: 22px;
    background: #30363d;
    border-radius: 11px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle.on {
    background: #238636;
  }
  .toggle::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    background: #fff;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
  }
  .toggle.on::after {
    transform: translateX(18px);
  }

  .port-row {
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(56, 139, 253, 0.08);
    border: 1px solid rgba(56, 139, 253, 0.3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .port-label {
    color: #79c0ff;
    font-size: 11px;
    font-family: monospace;
    white-space: nowrap;
  }
  .port-value {
    color: #c9d1d9;
    font-size: 13px;
    font-family: monospace;
    background: #0d1117;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid #30363d;
  }

  .note {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 6px;
    color: #f87171;
    font-size: 11px;
    line-height: 1.6;
  }
  .note strong { color: #fca5a5; }
</style>
</head>
<body>
<div class="label">网络加速工具设置示意（Surge / Stash / Clash 通用）</div>
<div class="app-window">
  <div class="app-header">
    <div class="app-icon"></div>
    <div class="app-title">设置</div>
  </div>
  <div class="app-body">
    <div class="setting-row">
      <div>
        <div class="setting-label">允许局域网 (Allow LAN)</div>
        <div class="setting-desc">开启后，局域网内的其他设备可以使用本机代理</div>
      </div>
      <div class="toggle on"></div>
    </div>

    <div class="port-row">
      <div class="port-label">HTTP 代理端口</div>
      <div class="port-value">7897</div>
    </div>

    <div class="note">
      <strong>⚠️ 如果 WSL 一直报网络超时，</strong>首先检查这里是否已开启。关掉再打开，保存，WSL 终端重试 <code style="background:#0d1117;padding:1px 5px;border-radius:3px;">curl -I https://www.google.com</code>
    </div>
  </div>
</div>
</body>
</html>
