<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSL2 + Hermes Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 900px;
    height: 383px;
    background: #0a0e27;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glowing orb top-right */
  .orb {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, rgba(139, 92, 246, 0.1) 40%, transparent 70%);
    top: -200px;
    right: -100px;
    pointer-events: none;
  }

  /* Bottom glow */
  .glow-bottom {
    position: absolute;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 200px;
    background: radial-gradient(ellipse, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Left accent bar */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(to bottom, #6366f1, #8b5cf6, #a855f7);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.8);
  }

  /* Terminal window chrome */
  .terminal {
    position: absolute;
    left: 40px;
    top: 60px;
    width: 340px;
    background: rgba(17, 24, 60, 0.9);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(99, 102, 241, 0.1);
  }

  .terminal-header {
    background: rgba(99, 102, 241, 0.15);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-bottom: 1px solid rgba(99, 102, 241, 0.2);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.red { background: #ef4444; }
  .dot.yellow { background: #eab308; }
  .dot.green { background: #22c55e; }

  .terminal-body {
    padding: 16px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: #a5b4fc;
  }

  .terminal-body .prompt { color: #6366f1; }
  .terminal-body .cmd { color: #e2e8f0; }
  .terminal-body .output { color: #64748b; }
  .terminal-body .ok { color: #4ade80; }

  /* Content area */
  .content {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    text-align: right;
    max-width: 440px;
  }

  .tag {
    display: inline-block;
    background: rgba(99, 102, 241, 0.15);
    border: 1px solid rgba(99, 102, 241, 0.4);
    color: #a5b4fc;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .title {
    font-size: 42px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }

  .title .plus {
    color: #6366f1;
    font-weight: 900;
  }

  .subtitle {
    font-size: 15px;
    color: #64748b;
    font-weight: 400;
    letter-spacing: 0.3px;
    margin-bottom: 20px;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .badge {
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid rgba(99, 102, 241, 0.3);
    color: #818cf8;
    font-size: 10px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'SF Mono', monospace;
  }

  /* Footer line */
  .footer-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(to right, #6366f1, #8b5cf6, #a855f7, transparent 80%);
  }
</style>
</head>
<body>
  <div class="orb"></div>
  <div class="glow-bottom"></div>
  <div class="accent-bar"></div>

  <div class="terminal">
    <div class="terminal-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="terminal-body">
      <div><span class="prompt">$</span> <span class="cmd">wsl --install</span></div>
      <div class="output" style="margin: 4px 0 12px 0;">Installing... done.</div>
      <div><span class="prompt">$</span> <span class="cmd">git clone ...</span></div>
      <div><span class="prompt">$</span> <span class="cmd">pip install -e .</span></div>
      <div class="output" style="margin: 4px 0 12px 0;">✓ Hermes Agent installed</div>
      <div><span class="prompt">$</span> <span class="cmd">hm</span></div>
      <div class="ok" style="margin-top: 4px;">▶ Agent ready</div>
    </div>
  </div>

  <div class="content">
    <div class="tag">Windows · WSL2</div>
    <div class="title">WSL2 <span class="plus">+</span><br>Hermes Agent</div>
    <div class="subtitle">Windows 上的 AI Agent 安装指南</div>
    <div class="badge-row">
      <div class="badge">100k ⭐</div>
      <div class="badge"> NousResearch</div>
      <div class="badge">SOP</div>
    </div>
  </div>

  <div class="footer-line"></div>
</body>
</html>
