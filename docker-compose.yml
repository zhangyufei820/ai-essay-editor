version: '3.8'

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: "https://rnujdnmxufmzgjvmddla.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_J6ZjOA1cvNVJE0msWjvJEA_Y3MHr9LH"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3000
      - DIFY_INTERNAL_URL=http://host.docker.internal:8080/v1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - postgres
    networks:
      - shenxiang-net

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=shenxiang
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=shenxiang
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shenxiang-net

volumes:
  postgres_data:

networks:
  shenxiang-net:
    driver: bridge