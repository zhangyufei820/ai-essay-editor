services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: "https://rnujdnmxufmzgjvmddla.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_J6ZjOA1cvNVJE0msWjvJEA_Y3MHr9LH"
        NEXT_PUBLIC_AUTHING_APP_ID: ${NEXT_PUBLIC_AUTHING_APP_ID}
    container_name: ai-essay-editor-nextjs-dev
    restart: unless-stopped
    read_only: true
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - shenxiang-net
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=
      - DIFY_INTERNAL_URL=http://docker-api-1:5001/v1
      - DIFY_IMAGE_GATEWAY_URL=http://dify-image-gateway:8001
      - DIFY_IMAGE_GATEWAY_PUBLIC_URL=http://43.154.111.156:8001
    volumes: []
    tmpfs:
      - /app/.next/standalone/.next/cache
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15
    container_name: ai-essay-editor-postgres-dev
    restart: unless-stopped
    read_only: true
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64
    environment:
      - POSTGRES_USER=shenxiang
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=shenxiang
    ports:
      - "127.0.0.1:5432:5432"
    tmpfs:
      - /var/run/postgresql
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shenxiang-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shenxiang -d shenxiang"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

networks:
  shenxiang-net:
    external: true
